version: '3.8'

services:
  # 1. RDS 사용 (컨테이너 없음, 환경변수로 접속)

  # 2. Qdrant 벡터 데이터베이스
  qdrant-container:
    image: qdrant/qdrant
    container_name: fridge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # 3. Python 임베딩 서버
  embedding-service:
    build: 
      context: ./python_embedding
      dockerfile: Dockerfile
    container_name: fridge-embedding
    ports:
      - "5000:5000"
    environment:
      - PORT=5000

  # 4. Spring Boot 백엔드
  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fridge-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # RDS 연결 정보 (.env에서 가져옴)
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      # 나머지 설정
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
    depends_on:
      - qdrant-container
      - embedding-service

volumes:
  qdrant_data: